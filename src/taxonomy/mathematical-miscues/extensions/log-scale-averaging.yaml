id: log-scale-averaging
name: Misreading a Log-Scale Average
domain: Mathematical Miscues
severity: warning
description: >
  Values measured on a logarithmic (or otherwise nonlinear) scale — pH, decibels,
  earthquake magnitude, star magnitude, log-returns — are averaged arithmetically and
  the result is read as the average of the underlying physical quantity. The
  calculation is valid, but the arithmetic mean of log-scale values equals the log of
  the geometric mean of the original quantity, not the mean of that quantity.
  Conflating the two answers a different question than intended and can mislead
  badly, because a one-unit step on the scale is a multiplicative (often 10x or ~32x)
  step in the quantity. This extends the domain's aggregation theme but is not a
  specific sub-pitfall example in the book.
detection_strategy: >
  In code and prose, flag an arithmetic mean or sum over a column known to be on a
  log or nonlinear scale — earthquake `mag`/Richter, `pH`, decibel/`dB`, log-returns,
  star magnitudes — especially when the result is described as the "average"
  magnitude/level/acidity or used as a stand-in for the physical quantity. Be
  suspicious of `mean()`/`AVG()` on such fields with no note that it reflects a
  geometric mean of the underlying quantity, and of summing log-scale values.
example_bad: >
  An analysis reports `avg_magnitude = df["mag"].mean()` as the "average earthquake,"
  implying typical energy release — but magnitude is logarithmic (an M6 releases ~32x
  the energy of an M5), so the arithmetic mean of magnitudes does not represent
  average energy at all.
example_good: >
  The analyst is explicit about which question is being answered: report the mean
  magnitude as a summary of the magnitude scale itself (equivalently, the geometric
  mean of energy), or — to summarize the physical quantity — convert magnitudes to
  energy, average in energy units, and convert back. The scale and its meaning are
  stated.
remediation: >
  Decide whether you want the average of the scale or the average of the underlying
  quantity. For the physical quantity, transform to linear units (energy,
  concentration, intensity, dollars), average there, then transform back if needed.
  When you do average on the log scale, label it as such — it is the geometric mean
  of the quantity, not its arithmetic mean.
references:
  - "Avoiding Data Pitfalls (Wiley, 2020), Pitfall 3: Mathematical Miscues (domain extension — not a specific sub-pitfall example in the book)"
  - "Limpert, Stahel & Abbt (2001), 'Log-normal Distributions across the Sciences,' BioScience 51(5) — the geometric mean and log-scale data"
  - "https://www.avoidingdatapitfalls.com"
